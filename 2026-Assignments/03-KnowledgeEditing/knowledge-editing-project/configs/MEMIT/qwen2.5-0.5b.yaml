alg_name: MEMIT
model_name: Qwen/Qwen2.5-0.5B-Instruct
device: 0
model_parallel: false
stats_dir: data/stats
max_length: 40

# This file is a practical starting point for EasyEdit. For final experiments,
# compare it with the hparams shipped by your EasyEdit version.
layers: [8, 9, 10, 11, 12]
layer_selection: all
fact_token: subject_last
v_num_grad_steps: 25
v_lr: 0.5
v_loss_layer: 12
v_weight_decay: 0.5
clamp_norm_factor: 4
kl_factor: 0.0625
mom2_adjustment: true
mom2_update_weight: 15000
batch_size: 1
rewrite_module_tmp: model.layers.{}.mlp.down_proj
layer_module_tmp: model.layers.{}
mlp_module_tmp: model.layers.{}.mlp
attn_module_tmp: model.layers.{}.self_attn
ln_f_module: model.norm
lm_head_module: model.embed_tokens
mom2_dataset: wikitext
mom2_n_samples: 100
mom2_dtype: float32
